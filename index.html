<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#111111" />
  <title>ScorePad — Sheet Music Viewer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- Top Bar -->
  <header id="toolbar">
    <div id="toolbar-row-main">
      <button id="btn-library" title="Library">📚</button>
      <button id="btn-open" title="Open PDF">📂</button>
      <button id="btn-gdrive" title="Open from Google Drive">☁️</button>
      <div class="separator"></div>
      <button id="btn-prev" title="Previous page">◀</button>
      <span id="page-info">0 / 0</span>
      <button id="btn-next" title="Next page">▶</button>
      <div class="separator"></div>
      <button id="btn-zoom-out" title="Zoom out">➖</button>
      <span id="zoom-level">100%</span>
      <button id="btn-zoom-in" title="Zoom in">➕</button>
      <div class="separator"></div>
      <button id="btn-highlight" class="tool-btn" title="Highlight">🖍️</button>
      <button id="btn-underline" class="tool-btn" title="Underline">U̲</button>
      <button id="btn-draw" class="tool-btn" title="Free draw">✏️</button>
      <button id="btn-text" class="tool-btn" title="Add text note">💬</button>
      <button id="btn-eraser" class="tool-btn" title="Eraser">🧹</button>
      <div class="separator"></div>
      <input type="color" id="color-picker" value="#FFFF00" title="Annotation color" />
      <label id="pen-width-group" title="Pen width">
        <span id="pen-width-icon">╱</span>
        <input type="range" id="pen-width" min="1" max="20" value="3" />
      </label>
      <button id="btn-undo" title="Undo">↩️</button>
      <button id="btn-save" title="Save annotated PDF">💾</button>
      <div class="separator"></div>
      <button id="btn-music" class="tool-btn" title="Music symbols">🎵</button>
      <button id="btn-toggle-music" title="Show/hide music annotations">👁️</button>
      <div class="separator"></div>
      <button id="btn-immersive" title="Immersive mode (hide toolbar)">🎹</button>
      <button id="btn-fullscreen" title="Full screen">⛶</button>
    </div>
    <div id="toolbar-doc-name"></div>
  </header>

  <!-- Status toast -->
  <div id="status-toast" class="hidden"></div>

  <!-- Hidden file input -->
  <input type="file" id="file-input" accept="application/pdf" hidden />

  <!-- Main canvas area -->
  <main id="viewer">
    <div id="canvas-wrapper">
      <canvas id="pdf-canvas"></canvas>
      <canvas id="music-canvas"></canvas>
      <canvas id="annotation-canvas"></canvas>
    </div>
    <div id="drop-zone">
      <p>🎼 Tap <strong>📂</strong> to open sheet music<br><small>or drop a PDF here</small></p>
    </div>
  </main>

  <!-- Inline text input overlay -->
  <div id="text-input-overlay" class="hidden">
    <textarea id="text-input-field" placeholder="Type note..." rows="2"></textarea>
    <div id="text-input-actions">
      <button id="text-input-ok">✓</button>
      <button id="text-input-cancel">✕</button>
    </div>
  </div>

  <!-- Google Drive folder browser modal -->
  <div id="gdrive-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="gdrive-title">Google Drive</h3>
        <button id="gdrive-close" title="Close">&times;</button>
      </div>
      <div id="gdrive-status"></div>
      <div id="gdrive-breadcrumb"></div>
      <div id="gdrive-file-list"></div>
    </div>
  </div>

  <!-- Library / Recents modal -->
  <div id="library-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>📚 Library</h3>
        <button id="library-close" title="Close">&times;</button>
      </div>
      <div id="library-list"></div>
    </div>
  </div>

  <!-- Music Symbol Picker Panel -->
  <div id="music-panel" class="hidden">
    <div id="music-panel-header">
      <span>Music Symbols</span>
      <button id="music-panel-close">&times;</button>
    </div>
    <div id="music-panel-controls">
      <label>Color: <input type="color" id="music-color" value="#FF0000" /></label>
      <label>Size: <input type="range" id="music-size" min="12" max="60" value="28" />
        <span id="music-size-label">28</span>
      </label>
    </div>
    <div id="music-symbol-grid"></div>
    <div id="music-selected">Tap a symbol, then tap the score to place it</div>
  </div>

  <!-- Eraser cursor follower -->
  <div id="eraser-cursor" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
